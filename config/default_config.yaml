version: 1.0.0
system:
  debug: false
  log_level: INFO
models:
  default_provider: openai
  openai:
    model_name: deepseek-v4-pro
    api_key: ''
    temperature: 0.7
memory:
  context_memory:
    backend: file_system
    file_dir: results
  task_memory:
    enabled: true
    memory_dir: ./config/mem_store
    top_k: 5
    alpha: 0.5
    include_details: true
    embedding_mode: description
    embedding:
      model_type: local
      model_name: ''
  online_memory:
    enabled: true
    aggregation: best
  long_memory:
    enabled: true
    idea_graph:
      similarity_threshold: 0.7
    prompt_evolver:
      enabled: true
      evolution_interval: 1
sci_tools:
  local: false
  remote: null
tools:
  web_search:
    max_results: 10
  literature_search:
    timeout: 30
    api_keys:
      semantic_scholar: ''
    kg_papers:
      api_url: http://172.30.35.89:5000/
agents:
  generation:
    model_provider: default
    generation_count: 3
    creativity: 0.7
    do_survey: false
    use_memory: false
    filter_failed_ideas: false
    failed_similarity_threshold: 0.7
    max_regeneration_attempts: 1
  reflection:
    count: 2
    model_provider: default
    detail_level: medium
  evolution:
    model_provider: default
    evolution_count: 2
    creativity_level: 0.6
    temperature: 0.7
    use_memory: false
    filter_failed_ideas: false
    failed_similarity_threshold: 0.7
    max_regeneration_attempts: 1
  method_development:
    model_provider: openai
  refinement:
    model_provider: openai
  ranking:
    model_provider: default
    criteria:
      novelty: 0.3
      plausibility: 0.4
      testability: 0.2
      alignment: 0.1
    strategy: default
  scholar:
    model_provider: default
    search_depth: moderate
    sources:
    - arxiv
    - crossref
    - web_search
  survey:
    model_provider: default
    max_papers: 50
    sources:
    - arxiv
    - crossref
    - web_search
  dr:
    model_provider: default
    enabled: true
    mode: simple
  exp_analyze:
    model_provider: default
    temperature: 0.7
    max_tokens: 4096
    timeout: 120
    use_llm_for_metric_direction: true
    use_llm_for_primary_metric: true
workflow:
  max_iterations: 2
  top_ideas_count: 3
  top_ideas_evo: true
  max_concurrent_tasks: 2
  loop_rounds: 2
  loop_mode: incremental
sci_task:
  scorer_model: deepseek-v4-pro
  evaluation_mode: llm_judge
  default_launcher: python code/experiment.py
experiment:
  model: glm-5
  use_mcts: false
  max_runs: 2
  max_parallel_experiments: 2
  gpu_per_experiment: 1.0
human_review:
  idea_review: true
  idea_timeout: 3600
  result_review: true
  result_timeout: 1800
  poll_interval: 5
scholar:
  search_depth: light
survey:
  max_papers: null
